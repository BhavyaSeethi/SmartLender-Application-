<!DOCTYPE html>
<html>
<head><title>Loan Approval Prediction</title></head>
<body style="font-family: Arial; margin: 40px;">
    <h3>Enter your Details for Loan Approval Prediction</h3>
    <form action="/submit" method="post">
        <!-- Gender -->
        <label>Gender</label>
        <select name="Gender"><option value="0">Male</option><option value="1">Female</option></select><br><br>
        <!-- Married -->
        <label>Married</label>
        <select name="Married"><option value="1">Yes</option><option value="0">No</option></select><br><br>
        <!-- Dependents -->
        <label>Dependents</label>
        <input type="number" name="Dependents"><br><br>
        <!-- Education -->
        <label>Education</label>
        <select name="Education"><option value="0">Graduate</option><option value="1">Not Graduate</option></select><br><br>
        <!-- Self Employed -->
        <label>Self Employed</label>
        <select name="Self_Employed"><option value="1">Yes</option><option value="0">No</option></select><br><br>
        <!-- Applicant Income -->
        <label>Applicant Income</label>
        <input type="number" name="ApplicantIncome"><br><br>
        <!-- Coapplicant Income -->
        <label>Coapplicant Income</label>
        <input type="number" name="CoapplicantIncome"><br><br>
        <!-- Loan Amount -->
        <label>Loan Amount</label>
        <input type="number" name="LoanAmount"><br><br>
        <!-- Loan Amount Term -->
        <label>Loan Amount Term</label>
        <input type="number" name="Loan_Amount_Term"><br><br>
        <!-- Credit History -->
        <label>Credit History</label>
        <select name="Credit_History"><option value="1">Good</option><option value="0">Bad</option></select><br><br>
        <!-- Property Area -->
        <label>Property Area</label>
        <select name="Property_Area"><option value="0">Urban</option><option value="1">Semiurban</option><option value="2">Rural</option></select><br><br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
