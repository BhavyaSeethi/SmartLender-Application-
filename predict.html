<!DOCTYPE html>
<html>
<head>
    <title>Loan Approval Prediction</title>
    <style>
        body { font-family: Arial; background-color: #f2f2f2; margin: 40px; }
        label { display: block; margin-top: 10px; }
        select, input[type=number] {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;
        }
        input[type=submit] {
            background-color: #04AA6D; color: white;
            padding: 12px 20px; border: none; border-radius: 4px;
            cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>
    <h3>Enter your Details for Loan Approval Prediction</h3>
    <form action="/submit" method="post">
        <label>Gender</label>
        <select name="Gender">
            <option value="0">Male</option>
            <option value="1">Female</option>
        </select>

        <label>Married</label>
        <select name="Married">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Dependents</label>
        <input type="number" name="Dependents">

        <label>Education</label>
        <select name="Education">
            <option value="0">Graduate</option>
            <option value="1">Not Graduate</option>
        </select>

        <label>Self Employed</label>
        <select name="Self_Employed">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Applicant Income</label>
        <input type="number" name="ApplicantIncome">

        <label>Coapplicant Income</label>
        <input type="number" name="CoapplicantIncome">

        <label>Loan Amount</label>
        <input type="number" name="LoanAmount">

        <label>Loan Amount Term</label>
        <input type="number" name="Loan_Amount_Term">

        <label>Credit History</label>
        <select name="Credit_History">
            <option value="1">Good</option>
            <option value="0">Bad</option>
        </select>

        <label>Property Area</label>
        <select name="Property_Area">
            <option value="0">Urban</option>
            <option value="1">Semiurban</option>
            <option value="2">Rural</option>
        </select>

        <input type="submit" value="Submit">
    </form>
</body>
                                 </html>
