<!DOCTYPE html>
<html>
<head>
    <title>Loan Approval Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
        }
        h3 {
            background-color: #6b8e23;
            color: white;
            text-align: center;
            padding: 15px;
            margin: 0;
        }
        .container {
            max-width: 700px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        select,
        input[type=number],
        input[type=text] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            margin-bottom: 12px;
        }
        input[type=submit] {
            background-color: #6b8e23;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }
        input[type=submit]:hover {
            background-color: #5a7a1a;
        }
    </style>
</head>
<body>
    <h3>Enter your Details for Loan Approval Prediction</h3>
    <div class="container">
        <form action="/submit" method="post">
            <label>Gender</label>
            <select name="Gender"><option value="0">Male</option><option value="1">Female</option></select>

            <label>Married</label>
            <select name="Married"><option value="1">Yes</option><option value="0">No</option></select>

            <label>Dependents</label>
            <input type="number" name="Dependents" placeholder="No. of Dependents (0,1,2,...)">

            <label>Education</label>
            <select name="Education"><option value="0">Graduate</option><option value="1">Not Graduate</option></select>

            <label>Self Employed</label>
            <select name="Self_Employed"><option value="1">Yes</option><option value="0">No</option></select>

            <label>Applicant Income</label>
            <input type="number" name="ApplicantIncome" placeholder="Your Income...">

            <label>Coapplicant Income</label>
            <input type="number" name="CoapplicantIncome" placeholder="Your Co‑Applicant Income...">

            <label>Loan Amount</label>
            <input type="number" name="LoanAmount" placeholder="Enter Your Loan Amount...">

            <label>Loan Amount Term</label>
            <input type="number" name="Loan_Amount_Term" placeholder="Enter Your Loan Amount in Days...">

            <label>Credit History</label>
            <select name="Credit_History"><option value="1">Good</option><option value="0">Bad</option></select>

            <label>Property Area</label>
            <select name="Property_Area"><option value="0">Urban</option><option value="1">Semiurban</option><option value="2">Rural</option></select>

            <input type="submit" value="Submit">
        </form>
    </div>
</body>
                </html>
